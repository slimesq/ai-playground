<html lang="zh-CN">

<title>音视频学习打卡</title>
<style>
:root {
  --bg:#f5f8f7;
  --surface:#ffffff;
  --surface-2:#edf4f2;
  --text:#14211f;
  --muted:#5f6f6b;
  --line:#d8e2de;
  --green:#137a5b;
  --cyan:#0f7894;
  --red:#bd3f35;
  --yellow:#94640d;
  --coral:#c95b35;
  --ink:#133e3b;
  --shadow:0 14px 34px rgba(29,55,49,.12);
}
* { box-sizing:border-box; }
body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;
  background:
    linear-gradient(180deg,#e6f0ed 0,#f5f8f7 360px,#f5f8f7 100%),
    repeating-linear-gradient(90deg,rgba(19,122,91,.035) 0 1px,transparent 1px 46px);
  color:var(--text);
  line-height:1.5;
}
main { max-width:1160px; margin:0 auto; padding:30px 22px 46px; }
header {
  position:relative;
  overflow:hidden;
  display:grid;
  gap:10px;
  margin-bottom:18px;
  padding:26px;
  color:#fff;
  background:linear-gradient(135deg,#153d3a 0,#1d705a 100%);
  border:1px solid rgba(255,255,255,.22);
  border-radius:8px;
  box-shadow:var(--shadow);
}
header::after {
  content:"";
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  height:4px;
  background:linear-gradient(90deg,var(--green),var(--cyan),var(--coral),var(--yellow));
}
h1 {
  margin:0;
  font-size:32px;
  line-height:1.2;
  letter-spacing:0;
  display:flex;
  align-items:center;
  gap:12px;
}
h1::before {
  content:"";
  width:12px;
  height:34px;
  border-radius:8px;
  background:linear-gradient(180deg,#fff,#9bd4c3);
}
p { margin:0; }
.subtitle { color:var(--muted); }
header .subtitle { color:#d9ece7; }
.notes { display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }
.note {
  border:1px solid rgba(255,255,255,.28);
  background:rgba(255,255,255,.13);
  border-radius:8px;
  padding:7px 10px;
  color:#f3fbf8;
  font-size:13px;
}
.grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin:18px 0 24px; }
.stat {
  position:relative;
  overflow:hidden;
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:8px;
  min-height:92px;
  padding:20px 18px 16px;
  box-shadow:0 8px 22px rgba(30,54,48,.07);
  transition:transform .16s ease,border-color .16s ease,box-shadow .16s ease;
}
.stat:hover { transform:translateY(-2px); border-color:#b9cbc6; box-shadow:0 12px 28px rgba(30,54,48,.1); }
.stat::before { content:""; position:absolute; inset:0 auto 0 0; width:4px; background:var(--green); }
.stat:nth-child(2)::before { background:var(--cyan); }
.stat:nth-child(3)::before { background:var(--coral); }
.stat:nth-child(4)::before { background:var(--yellow); }
.stat strong { display:block; font-size:30px; line-height:1.05; margin-bottom:8px; }
.stat span { color:var(--muted); font-size:13px; font-weight:600; }
.dashboard {
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:16px;
  margin-bottom:10px;
}
.dashboard section {
  min-height:224px;
  padding:18px 18px 16px;
  border:1px solid var(--line);
  border-radius:8px;
  background:rgba(255,255,255,.88);
  box-shadow:0 10px 26px rgba(30,54,48,.08);
}
.dashboard .section-head { margin-bottom:14px; }
.dashboard .today-task,.progress-panel {
  min-height:150px;
  box-shadow:none;
}
.progress-panel {
  padding:18px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  border:1px solid var(--line);
  border-left:4px solid var(--green);
  border-radius:8px;
  background:linear-gradient(90deg,rgba(19,122,91,.06),#fff 34%);
}
.dashboard .progress-outer { height:26px; }
.dashboard .progress-meta { margin-top:14px; }
.dashboard .progress-percent { font-size:32px; }
section {
  padding:20px 0;
  margin-bottom:6px;
  border-top:1px solid var(--line);
}
.section-head { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:12px; }
h2 { margin:0; font-size:18px; }
.section-head h2 {
  display:flex;
  align-items:center;
  gap:8px;
}
.section-head h2::before {
  content:"";
  width:4px;
  height:18px;
  border-radius:8px;
  background:var(--green);
}
select,button { font:inherit; }
button,.file-label {
  border:1px solid var(--line);
  background:var(--surface);
  color:var(--text);
  border-radius:8px;
  padding:8px 11px;
  cursor:pointer;
  box-shadow:0 4px 10px rgba(30,54,48,.05);
  transition:transform .12s ease,border-color .16s ease,background .16s ease,box-shadow .16s ease;
}
button:hover,.file-label:hover { border-color:var(--cyan); transform:translateY(-1px); box-shadow:0 8px 18px rgba(30,54,48,.1); }
button:active,.file-label:active { transform:translateY(0) scale(.98); }
button.primary { background:var(--ink); color:#fff; border-color:var(--ink); }
button.primary:hover { background:var(--green); border-color:var(--green); }
button.danger:hover { border-color:var(--red); color:var(--red); }
select {
  border:1px solid var(--line);
  border-radius:8px;
  background:var(--surface);
  color:var(--text);
  padding:9px 10px;
  min-width:260px;
  box-shadow:0 4px 10px rgba(30,54,48,.05);
}
.today-task,.task-row,.week-row,.milestone {
  border:1px solid var(--line);
  border-radius:8px;
  background:var(--surface);
  box-shadow:0 8px 20px rgba(30,54,48,.06);
}
.today-task {
  min-height:124px;
  padding:18px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  gap:11px;
  border-left:4px solid var(--green);
  background:linear-gradient(90deg,rgba(19,122,91,.06),#fff 34%);
}
.task-meta { display:flex; flex-wrap:wrap; gap:8px; color:var(--muted); font-size:13px; }
.task-meta span {
  display:inline-flex;
  align-items:center;
  min-height:24px;
  padding:2px 8px;
  border-radius:8px;
  background:var(--surface-2);
}
.task-title { font-weight:700; font-size:16px; }
.actions { display:flex; flex-wrap:wrap; gap:8px; }
.progress-outer {
  height:20px;
  border-radius:8px;
  background:var(--surface-2);
  overflow:hidden;
  border:1px solid var(--line);
  box-shadow:inset 0 1px 2px rgba(30,54,48,.08);
}
.progress-inner {
  height:100%;
  width:0%;
  background:linear-gradient(90deg,var(--green),var(--cyan),var(--coral));
  transition:width .25s ease;
}
.progress-meta {
  display:flex;
  align-items:baseline;
  gap:10px;
  margin-top:9px;
  flex-wrap:wrap;
}
.progress-percent {
  color:var(--green);
  font-size:24px;
  font-weight:800;
  line-height:1;
  padding:3px 9px;
  border-radius:8px;
  background:#e8f4f0;
}
.progress-label { color:var(--muted); font-size:13px; }
.task-list { display:grid; gap:9px; }
.task-row {
  display:grid;
  grid-template-columns:52px minmax(150px,180px) minmax(0,1fr) auto;
  gap:12px;
  align-items:center;
  min-height:62px;
  padding:13px;
  transition:transform .16s ease,border-color .16s ease,box-shadow .16s ease;
}
.task-row.is-done {
  border-color:#abd2c5;
  background:linear-gradient(90deg,rgba(19,122,91,.08),#fff 22%);
}
.check {
  position:relative;
  width:36px;
  height:36px;
  border-radius:8px;
  border:1px solid #cbded8;
  background:var(--surface-2);
  display:grid;
  place-items:center;
  cursor:pointer;
  color:transparent;
  line-height:1;
  justify-self:center;
  transition:transform .12s ease,background .16s ease,border-color .16s ease,box-shadow .16s ease;
}
.check:hover {
  border-color:var(--green);
  background:#e2f1ec;
  box-shadow:0 6px 14px rgba(19,122,91,.14);
}
.check:active { transform:scale(.92); }
.check:focus-visible {
  outline:3px solid rgba(15,120,148,.24);
  outline-offset:2px;
}
.check.done {
  background:var(--green);
  border-color:var(--green);
  color:transparent;
  box-shadow:0 8px 18px rgba(19,122,91,.22);
}
.check.done::after {
  content:"";
  position:absolute;
  left:50%;
  top:48%;
  width:9px;
  height:17px;
  border:solid #fff;
  border-width:0 3px 3px 0;
  transform:translate(-50%,-56%) rotate(45deg);
  transform-origin:center;
}
.track {
  color:var(--muted);
  font-size:13px;
  font-weight:700;
  white-space:normal;
  overflow-wrap:anywhere;
  width:fit-content;
  max-width:100%;
  min-height:28px;
  display:inline-flex;
  align-items:center;
  padding:3px 9px;
  border:1px solid #d5e6e1;
  border-radius:8px;
  background:#ebf5f2;
}
.track.ls { color:var(--cyan); background:#e8f4f6; border-color:#d0e4e8; }
.track.ydy { color:var(--yellow); background:#f8f0df; border-color:#ecd9ae; }
.duration {
  color:var(--muted);
  font-size:13px;
  text-align:right;
  white-space:normal;
  overflow-wrap:anywhere;
  max-width:190px;
  font-weight:600;
}
.duration-date { color:var(--text); font-weight:700; }
.duration-sub { color:var(--muted); font-size:12px; margin-top:4px; }
.task-row > div:nth-child(3) { min-width:0; overflow-wrap:anywhere; }
.week-list { display:grid; gap:9px; }
.week-row {
  min-height:74px;
  padding:14px;
  display:grid;
  grid-template-columns:82px 126px minmax(0,1fr) auto;
  gap:14px;
  align-items:center;
  cursor:pointer;
  transition:transform .16s ease,border-color .16s ease,box-shadow .16s ease;
}
.week-row:hover,.task-row:hover,.milestone:hover { border-color:#b7cac3; transform:translateY(-1px); box-shadow:0 12px 28px rgba(30,54,48,.09); }
.week-row:active { transform:translateY(0) scale(.992); border-color:var(--green); }
.week-row.current { border-color:var(--cyan); box-shadow:inset 4px 0 0 var(--cyan),0 8px 20px rgba(30,54,48,.06); }
.week-row.selected {
  border-color:var(--green);
  background:linear-gradient(90deg,rgba(19,122,91,.08),#fff 28%);
  box-shadow:inset 4px 0 0 var(--green),0 12px 28px rgba(30,54,48,.1);
}
.week-row.selected .week-title { color:var(--green); }
.week-row.done { box-shadow:inset 4px 0 0 var(--green),0 8px 20px rgba(30,54,48,.06); }
.week-title { font-weight:800; }
.week-range,.week-count { color:var(--muted); font-size:13px; }
.week-row > div:nth-child(3) > div:first-child { font-weight:700; }
.pills { display:flex; gap:4px; flex-wrap:wrap; justify-content:flex-end; }
.week-row > div:nth-child(3) { min-width:0; overflow-wrap:anywhere; }
.week-row .pills { min-width:148px; }
.pill { width:15px; height:15px; border-radius:8px; border:1px solid var(--line); background:var(--surface-2); }
.pill.done { background:var(--green); border-color:var(--green); }
.pill.today { outline:2px solid var(--cyan); outline-offset:1px; }
.milestones { display:grid; gap:8px; }
.milestone {
  display:grid;
  grid-template-columns:128px 1fr;
  gap:10px;
  padding:12px 14px;
  border-left:4px solid #d8e2de;
}
.milestone time { color:var(--green); font-weight:700; }
.milestone:hover { border-left-color:var(--green); }
.data-actions { display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
.data-hint {
  margin:10px 0 0;
  color:var(--muted);
  font-size:13px;
  line-height:1.5;
}
.hidden { display:none; }
.empty {
  color:var(--muted);
  padding:18px;
  border:1px dashed var(--line);
  border-radius:8px;
  background:rgba(255,255,255,.62);
}
@media (max-width:780px) {
  main { padding:14px; }
  header { padding:18px; }
  h1 { font-size:26px; }
  .grid { grid-template-columns:repeat(2,1fr); }
  .dashboard { grid-template-columns:1fr; }
  .dashboard section { min-height:auto; }
  .section-head { align-items:stretch; flex-direction:column; }
  select { min-width:100%; }
  .task-row {
    grid-template-columns:42px minmax(0,1fr);
    grid-template-areas:
      "check meta"
      "title title"
      "duration duration";
    align-items:start;
  }
  .task-row .check { grid-area:check; margin-top:0; justify-self:start; }
  .task-row .track { grid-area:meta; white-space:normal; line-height:1.4; }
  .task-row > div:nth-child(3) { grid-area:title; }
  .task-row .duration { grid-area:duration; max-width:none; text-align:left; white-space:normal; }
  .week-row { grid-template-columns:1fr; }
  .pills { justify-content:flex-start; }
  .milestone { grid-template-columns:1fr; }
}
</style>
</head>

    const periods=(DATA.specialPeriods&&DATA.specialPeriods.length?DATA.specialPeriods:(DATA.rest?[DATA.rest]:[]));
    const currentPeriod=periods.find(period=>period.start<=t&&t<=period.end);
    document.getElementById('todayBox').innerHTML=`<p class="empty">${currentPeriod?escapeHTML(currentPeriod.title):'今天没有排期任务。'}</p>`;
    return;
  }
  document.getElementById('todayBox').innerHTML=tasks.map(task=>`<div class="today-task"><div class="task-meta"><span>${escapeHTML(task.day)}</span><span>${escapeHTML(task.trackName)}</span><span>${escapeHTML(task.duration||'周末任务')}</span></div><div class="task-title">${escapeHTML(task.title)}</div><div class="actions"><button class="primary" onclick="toggleTask('${task.id}')">${taskDone(task.id)?'取消完成':'完成打卡'}</button></div></div>`).join('')
}
function renderWeekSelect(){const select=document.getElementById('weekSelect');select.innerHTML=DATA.weeks.map(w=>`<option value="${w.week}">第${w.week}周 | ${escapeHTML(w.range)} | ${escapeHTML(w.theme||'学习任务')}</option>`).join('');select.value=String(selectedWeek);select.onchange=()=>{selectedWeek=Number(select.value);render()}}
function renderWeekTasks(){const w=DATA.weeks.find(item=>item.week===selectedWeek),box=document.getElementById('weekTasks');if(!w){box.innerHTML='<p class="empty">没有找到该周。</p>';return}box.innerHTML=w.tasks.map(task=>`<div class="task-row ${taskDone(task.id)?'is-done':''}"><button class="check ${taskDone(task.id)?'done':''}" aria-label="${taskDone(task.id)?'取消完成':'完成打卡'}" onclick="toggleTask('${task.id}')"></button><div class="track ${task.track}">${escapeHTML(task.day)} · ${escapeHTML(task.trackName)}</div><div>${escapeHTML(task.title)}</div><div class="duration"><div class="duration-date">${escapeHTML(task.date)}</div>${task.duration?`<div class="duration-sub">${escapeHTML(task.duration)}</div>`:''}</div></div>`).join('')}
function renderWeekList(){const t=todayISO();document.getElementById('weekList').innerHTML=DATA.weeks.map(w=>{const done=w.tasks.filter(task=>taskDone(task.id)).length,isCurrent=w.start<=t&&t<=w.end,isSelected=w.week===selectedWeek,cls=`${isCurrent?' current':''}${isSelected?' selected':''}${done===w.tasks.length?' done':''}`;const pills=w.tasks.map(task=>`<span class="pill ${taskDone(task.id)?'done':''} ${task.date===t?'today':''}"></span>`).join('');return `<div class="week-row${cls}" onclick="selectedWeek=${w.week};render()"><div class="week-title">第${w.week}周</div><div class="week-range">${escapeHTML(w.range)}</div><div><div>${escapeHTML(w.theme||'学习任务')}</div><div class="week-count">${done}/${w.tasks.length} 完成 · 零声 ${w.totalMin}min</div></div><div class="pills">${pills}</div></div>`}).join('')}
function renderMilestones(){document.getElementById('milestones').innerHTML=DATA.milestones.map(m=>`<div class="milestone"><time>${escapeHTML(m.date)}</time><div>${escapeHTML(m.name)}</div></div>`).join('')}
function syncHeaders(includeJson=true){const headers={};if(includeJson) headers['Content-Type']='application/json';const apiKey=getStoredApiKey();if(apiKey) headers['x-api-key']=apiKey;return headers}
async function fetchJSON(url,options={}){const response=await fetch(url,options);let payload={};try{payload=await response.json()}catch{}if(!response.ok){const error=new Error(payload.message||`请求失败（${response.status}）`);error.status=response.status;throw error}return payload}
async function loadServerConfig(){try{const data=await fetchJSON('/api/config');syncState.authRequired=!!data.authRequired;syncState.serverReachable=true;syncState.status=syncState.authRequired&&!getStoredApiKey()?'服务器需要同步口令':'已连接同步服务'}catch(error){syncState.serverReachable=false;syncState.status='当前仅本地保存'}updateSyncUI()}
async function syncToServer({silent=false,replace=false}={}){if(syncState.authRequired&&!getStoredApiKey()){syncState.status='服务器需要同步口令';updateSyncUI();if(!silent) alert('请先设置同步口令。');return}if(activeSyncPromise) return activeSyncPromise;syncState.busy=true;syncState.status='正在同步...';updateSyncUI();activeSyncPromise=(async()=>{try{const payload=await fetchJSON('/api/sync',{method:'POST',headers:syncHeaders(),body:JSON.stringify({mode:replace?'replace':'merge',state:{entries:state.entries,lastSyncedAt:state.lastSyncedAt||''}})});const merged=normalizeState(payload.state||payload);state.entries=merged.entries;state.lastSyncedAt=payload.serverTime||new Date().toISOString();saveState();syncState.serverReachable=true;syncState.lastSyncedAt=state.lastSyncedAt;syncState.status='同步成功';render()}catch(error){if(error.status===401){syncState.authRequired=true;syncState.status='同步口令错误';if(!silent) alert('同步口令不正确，请重新设置。')}else{syncState.serverReachable=false;syncState.status='同步失败，已保留本地记录';if(!silent) alert('同步失败，打卡已保存在当前设备。')}}finally{syncState.busy=false;updateSyncUI();activeSyncPromise=null}})();return activeSyncPromise}
async function promptForApiKey(){const current=getStoredApiKey();const next=window.prompt('请输入同步口令。服务器未设置口令时可以留空。',current);if(next===null) return;setStoredApiKey(next.trim());await loadServerConfig();if(!syncState.authRequired||getStoredApiKey()) await syncToServer({silent:true});else updateSyncUI()}
function exportData(){const done=Object.fromEntries(Object.entries(state.entries).filter(([,record])=>record.done).map(([taskId,record])=>[taskId,record.updatedAt]));const entrySnapshots=Object.entries(state.entries).map(([taskId,record])=>{const task=TASK_INDEXES.byId.get(taskId);return{taskId,record,task:task?{id:task.id,week:task.week,date:task.date,day:task.day,track:task.track,trackName:task.trackName,title:task.title}:null}});const blob=new Blob([JSON.stringify({exportedAt:new Date().toISOString(),storeKey:STORE_KEY,lastSyncedAt:state.lastSyncedAt||'',entries:state.entries,done,entrySnapshots},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`study-tracker-backup-${todayISO()}.json`;a.click();URL.revokeObjectURL(a.href)}
function importData(file){const reader=new FileReader();reader.onload=async()=>{try{const data=JSON.parse(reader.result);const imported=importStateWithReport(data);if(imported.report.sourceCount>0&&imported.report.matched===0){alert('导入完成，但没有匹配到当前排期任务。这个备份很可能来自旧版排期，日期或任务 ID 已经变了。');return}const restoredEntries=restampImportedEntries(imported.state.entries);const fullSnapshot=isFullSnapshotBackup(data,imported);state.entries=fullSnapshot?restoredEntries:mergeEntryMaps(state.entries,restoredEntries);state.lastSyncedAt='';saveState();render();if(fullSnapshot&&imported.report.matched>0) alert(`导入完成：已完整恢复 ${imported.report.matched} 条打卡记录。`);else if(imported.report.unmatched>0) alert(`导入完成：已恢复 ${imported.report.matched} 条，另有 ${imported.report.unmatched} 条没有匹配到当前排期。`);else if(imported.report.matched>0) alert(`导入完成：已恢复 ${imported.report.matched} 条打卡记录。`);await syncToServer({silent:true,replace:fullSnapshot})}catch(error){alert('导入失败：不是有效的 JSON 备份。')}};reader.readAsText(file,'utf-8')}
function resetAllTasks(){if(!confirm('确定清空全部打卡数据吗？这会覆盖服务器上的同步记录。')) return;const updatedAt=new Date().toISOString();allTasks.forEach(task=>{state.entries[task.id]=createEntry(false,updatedAt)});state.lastSyncedAt='';saveState();render();syncToServer({silent:true})}
function bindActions(){document.getElementById('syncBtn').onclick=()=>syncToServer();document.getElementById('setKeyBtn').onclick=promptForApiKey;document.getElementById('exportBtn').onclick=exportData;document.getElementById('importFile').onchange=event=>event.target.files[0]&&importData(event.target.files[0]);document.getElementById('resetBtn').onclick=resetAllTasks;window.addEventListener('offline',()=>{syncState.serverReachable=false;syncState.status='网络离线，当前仅本地保存';updateSyncUI()});window.addEventListener('online',async()=>{await loadServerConfig();if(!syncState.authRequired||getStoredApiKey()) await syncToServer({silent:true})})}
async function init(){bindActions();render();await loadServerConfig();if(!syncState.authRequired||getStoredApiKey()) await syncToServer({silent:true})}
init();
</script>
